<span class="material-symbols-outlined text-error text-[32px]" data-icon="report" style="font-variation-settings: 'FILL' 1;">report</span>

                This action cannot be undone. The series will be set to <span class="text-primary font-bold">ONGOING</span> if approved, or returned to <span class="text-on-surface-variant font-bold">DRAFT</span> if rejected.

<!-- Micro-interaction Script -->
<script>
        // Simple scale effect on mouse move for the modal
        const modal = document.querySelector('.studio-glass');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 100;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 100;
            // Apply a very subtle parallax to the modal for that 'premium' feel
            if (modal) {
                modal.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
            }
        });

        // Button Ripple Effect
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('mousedown', function(e) {
                this.classList.add('scale-[0.97]');
            });
            btn.addEventListener('mouseup', function(e) {
                this.classList.remove('scale-[0.97]');
            });
            btn.addEventListener('mouseleave', function(e) {
                this.classList.remove('scale-[0.97]');
            });
        });
    </script>
