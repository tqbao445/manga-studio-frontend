<style>
        body {
            background-color: #131315;
            font-family: 'Geist', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .input-glow:focus-within {
            box-shadow: 0 0 0 2px rgba(208, 188, 255, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="dark bg-background text-on-surface">
<div class="flex flex-col md:flex-row min-height-screen min-h-screen">
<!-- Left Column: Full-height illustration -->
<aside class="hidden md:block md:w-1/2 lg:w-3/5 relative overflow-hidden">
<img alt="Manga Studio Illustration" class="absolute inset-0 w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBUfjVznnkkJdKDp-8c43-5DV6CumS8xjkDqrxJU2Yvc8ljnlYY8NQtpCtMWbpF7RNtDj-BLWm8reRcgRDtsHtJF2sJGQz5nkawD0owGcTOvDYSpqCZzdVTj6MGzgH9q2fg4D325alT3SZ2LpYUU_n1AcbSPXBdb6y63v8F6Iep3AKyvlWGy6w3vu1IQiu0rP2MdBQlC5qwJAS3FS56Ya3vkylpfGxHZ9UbPle1LmkHF-QMg7gVc-IE7W_vM_nLDAhXG6LPjhG7Uxjc">
<div class="absolute inset-0 bg-gradient-to-r from-background/20 to-background/60"></div>
<!-- Overlay branding -->
<div class="absolute bottom-12 left-12 z-10">
<div class="flex items-center gap-3 bg-background/40 backdrop-blur-md p-4 rounded-xl border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">auto_awesome_motion</span>
<div>
<p class="font-headline-md text-on-surface text-lg leading-tight">MangaFlow</p>
<p class="font-label-sm text-outline tracking-wider uppercase">Creative Engine</p>
</div>
</div>
</div>
</aside>
<!-- Right Column: Login form -->
<main class="w-full md:w-1/2 lg:w-2/5 flex items-center justify-center p-gutter md:p-container-padding bg-surface">
<div class="w-full max-w-md animate-fade-in">
<!-- Header section -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="md:hidden mb-6 flex items-center justify-center bg-primary/10 w-14 h-14 rounded-xl">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">
                            auto_awesome_motion
                        </span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to manage your manga production workflow</p>
</div>
<!-- Form section -->
<form class="space-y-6" id="loginForm" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative flex items-center group input-glow rounded-lg bg-surface-container-low border border-outline-variant/30 transition-all focus-within:border-primary">
<span class="material-symbols-outlined absolute left-3 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-transparent border-none text-on-surface py-3.5 pl-11 pr-4 focus:ring-0 font-body-md text-body-md placeholder:text-outline/40" id="email" placeholder="name@studio.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative flex items-center group input-glow rounded-lg bg-surface-container-low border border-outline-variant/30 transition-all focus-within:border-primary">
<span class="material-symbols-outlined absolute left-3 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-transparent border-none text-on-surface py-3.5 pl-11 pr-12 focus:ring-0 font-body-md text-body-md placeholder:text-outline/40" id="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-3 text-outline hover:text-on-surface transition-colors focus:outline-none" id="togglePassword" type="button">
<span class="material-symbols-outlined" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between">
<label class="flex items-center cursor-pointer group">
<div class="relative flex items-center">
<input class="peer hidden" type="checkbox">
<div class="w-5 h-5 border-2 border-outline-variant rounded bg-surface-container-lowest peer-checked:bg-primary peer-checked:border-primary transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-[16px] font-bold opacity-0 peer-checked:opacity-100">check</span>
</div>
</div>
<span class="ml-2 font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed transition-colors" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-xl hover:brightness-110 active:scale-[0.98] transition-all duration-200 shadow-lg shadow-primary/10 mt-2 font-semibold" type="submit">
                        Login
                    </button>
</form>
<!-- Footer links -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
Don't have an account? <a class="font-label-md text-label-md text-primary hover:text-primary-fixed hover:underline transition-colors font-semibold" href="#">Sign up</a>
</p>
</div>
<!-- System Branding -->
<p class="text-center mt-12 font-label-sm text-label-sm text-outline/40 tracking-widest uppercase">
                    MangaFlow Creative Studio Engine
                </p>
</div>
</main>
</div>
<script>
        // Password Visibility Toggle Logic
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const passwordIcon = document.getElementById('passwordIcon');

        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            passwordIcon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Simple form interaction simulation
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            const btn = loginForm.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-xl">progress_activity</span>';
            
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = originalText;
                alert('Login requested. This is a UI demonstration.');
            }, 1500);
        });
    </script>


</body></html>
